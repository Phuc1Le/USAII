{
    "openapi": "3.1.0",
    "info": {
        "title": "Zero to One Agent API",
        "version": "0.1.0"
    },
    "paths": {
        "/agent/clarity": {
            "post": {
                "summary": "Assess Clarity",
                "operationId": "assess_clarity_agent_clarity_post",
                "requestBody": {
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/ClarityRequest"
                            }
                        }
                    },
                    "required": true
                },
                "responses": {
                    "200": {
                        "description": "Successful Response",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ClarityResponse"
                                }
                            }
                        }
                    },
                    "422": {
                        "description": "Validation Error",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/HTTPValidationError"
                                }
                            }
                        }
                    }
                }
            }
        },
        "/agent/clarity/answers": {
            "post": {
                "summary": "Reassess Clarity",
                "operationId": "reassess_clarity_agent_clarity_answers_post",
                "requestBody": {
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/ClarityAnswersRequest"
                            }
                        }
                    },
                    "required": true
                },
                "responses": {
                    "200": {
                        "description": "Successful Response",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ClarityResponse"
                                }
                            }
                        }
                    },
                    "422": {
                        "description": "Validation Error",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/HTTPValidationError"
                                }
                            }
                        }
                    }
                }
            }
        },
        "/agent/goals": {
            "post": {
                "summary": "Suggest Goals",
                "operationId": "suggest_goals_agent_goals_post",
                "requestBody": {
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/GoalsRequest"
                            }
                        }
                    },
                    "required": true
                },
                "responses": {
                    "200": {
                        "description": "Successful Response",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/GoalsResponse"
                                }
                            }
                        }
                    },
                    "422": {
                        "description": "Validation Error",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/HTTPValidationError"
                                }
                            }
                        }
                    }
                }
            }
        },
        "/agent/plan": {
            "post": {
                "summary": "Generate Plan",
                "operationId": "generate_plan_agent_plan_post",
                "requestBody": {
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/PlanRequest"
                            }
                        }
                    },
                    "required": true
                },
                "responses": {
                    "200": {
                        "description": "Successful Response",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/PlanResponse"
                                }
                            }
                        }
                    },
                    "422": {
                        "description": "Validation Error",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/HTTPValidationError"
                                }
                            }
                        }
                    }
                }
            }
        },
        "/agent/tasks": {
            "post": {
                "summary": "Generate Tasks",
                "operationId": "generate_tasks_agent_tasks_post",
                "requestBody": {
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/GenerateTasksRequest"
                            }
                        }
                    },
                    "required": true
                },
                "responses": {
                    "200": {
                        "description": "Successful Response",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/GenerateTasksResponse"
                                }
                            }
                        }
                    },
                    "422": {
                        "description": "Validation Error",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/HTTPValidationError"
                                }
                            }
                        }
                    }
                }
            }
        },
        "/agent/chat": {
            "post": {
                "summary": "Chat",
                "operationId": "chat_agent_chat_post",
                "requestBody": {
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/ChatRequest"
                            }
                        }
                    },
                    "required": true
                },
                "responses": {
                    "200": {
                        "description": "Successful Response",
                        "content": {
                            "application/json": {
                                "schema": {}
                            }
                        }
                    },
                    "422": {
                        "description": "Validation Error",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/HTTPValidationError"
                                }
                            }
                        }
                    }
                }
            }
        },
        "/agent/chat/summary": {
            "post": {
                "summary": "Summarize Chat",
                "operationId": "summarize_chat_agent_chat_summary_post",
                "requestBody": {
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/SummaryRequest"
                            }
                        }
                    },
                    "required": true
                },
                "responses": {
                    "200": {
                        "description": "Successful Response",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/SummaryResponse"
                                }
                            }
                        }
                    },
                    "422": {
                        "description": "Validation Error",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/HTTPValidationError"
                                }
                            }
                        }
                    }
                }
            }
        }
    },
    "components": {
        "schemas": {
            "ChatMessage": {
                "properties": {
                    "role": {
                        "type": "string",
                        "enum": [
                            "user",
                            "assistant"
                        ],
                        "title": "Role"
                    },
                    "content": {
                        "type": "string",
                        "title": "Content"
                    }
                },
                "type": "object",
                "required": [
                    "role",
                    "content"
                ],
                "title": "ChatMessage"
            },
            "ChatRequest": {
                "properties": {
                    "session_id": {
                        "type": "string",
                        "title": "Session Id"
                    },
                    "scope_type": {
                        "type": "string",
                        "enum": [
                            "step",
                            "project"
                        ],
                        "title": "Scope Type"
                    },
                    "scope_step_title": {
                        "anyOf": [
                            {
                                "type": "string"
                            },
                            {
                                "type": "null"
                            }
                        ],
                        "title": "Scope Step Title"
                    },
                    "project_context": {
                        "$ref": "#/components/schemas/ProjectContext"
                    },
                    "history": {
                        "items": {
                            "$ref": "#/components/schemas/ChatMessage"
                        },
                        "type": "array",
                        "title": "History"
                    },
                    "new_message": {
                        "type": "string",
                        "title": "New Message"
                    },
                    "summary": {
                        "anyOf": [
                            {
                                "type": "string"
                            },
                            {
                                "type": "null"
                            }
                        ],
                        "title": "Summary"
                    }
                },
                "type": "object",
                "required": [
                    "session_id",
                    "scope_type",
                    "scope_step_title",
                    "project_context",
                    "history",
                    "new_message"
                ],
                "title": "ChatRequest"
            },
            "ClarifyingQuestion": {
                "properties": {
                    "question": {
                        "type": "string",
                        "title": "Question"
                    }
                },
                "type": "object",
                "required": [
                    "question"
                ],
                "title": "ClarifyingQuestion"
            },
            "ClarityAnswersRequest": {
                "properties": {
                    "idea": {
                        "type": "string",
                        "title": "Idea"
                    },
                    "answers": {
                        "items": {
                            "$ref": "#/components/schemas/QAPair"
                        },
                        "type": "array",
                        "title": "Answers"
                    }
                },
                "type": "object",
                "required": [
                    "idea",
                    "answers"
                ],
                "title": "ClarityAnswersRequest"
            },
            "ClarityRequest": {
                "properties": {
                    "category": {
                        "type": "string",
                        "title": "Category"
                    },
                    "description": {
                        "type": "string",
                        "title": "Description"
                    },
                    "idea": {
                        "type": "string",
                        "title": "Idea"
                    }
                },
                "type": "object",
                "required": [
                    "category",
                    "description",
                    "idea"
                ],
                "title": "ClarityRequest"
            },
            "ClarityResponse": {
                "properties": {
                    "clarity_score": {
                        "type": "number",
                        "title": "Clarity Score"
                    },
                    "needs_clarification": {
                        "type": "boolean",
                        "title": "Needs Clarification"
                    },
                    "clarifying_questions": {
                        "items": {
                            "$ref": "#/components/schemas/ClarifyingQuestion"
                        },
                        "type": "array",
                        "title": "Clarifying Questions"
                    },
                    "enriched_idea": {
                        "anyOf": [
                            {
                                "type": "string"
                            },
                            {
                                "type": "null"
                            }
                        ],
                        "title": "Enriched Idea"
                    }
                },
                "type": "object",
                "required": [
                    "clarity_score",
                    "needs_clarification",
                    "clarifying_questions"
                ],
                "title": "ClarityResponse"
            },
            "GenerateTasksRequest": {
                "properties": {
                    "step_title": {
                        "type": "string",
                        "title": "Step Title"
                    },
                    "step_description": {
                        "type": "string",
                        "title": "Step Description"
                    },
                    "project_idea": {
                        "type": "string",
                        "title": "Project Idea"
                    }
                },
                "type": "object",
                "required": [
                    "step_title",
                    "step_description",
                    "project_idea"
                ],
                "title": "GenerateTasksRequest"
            },
            "GenerateTasksResponse": {
                "properties": {
                    "tasks": {
                        "items": {
                            "$ref": "#/components/schemas/SubTask"
                        },
                        "type": "array",
                        "title": "Tasks"
                    }
                },
                "type": "object",
                "required": [
                    "tasks"
                ],
                "title": "GenerateTasksResponse"
            },
            "Goal": {
                "properties": {
                    "title": {
                        "type": "string",
                        "title": "Title"
                    },
                    "description": {
                        "type": "string",
                        "title": "Description"
                    },
                    "complete_in": {
                        "type": "integer",
                        "title": "Complete In"
                    }
                },
                "type": "object",
                "required": [
                    "title",
                    "description",
                    "complete_in"
                ],
                "title": "Goal"
            },
            "GoalsRequest": {
                "properties": {
                    "category": {
                        "type": "string",
                        "title": "Category"
                    },
                    "description": {
                        "type": "string",
                        "title": "Description"
                    },
                    "idea": {
                        "type": "string",
                        "title": "Idea"
                    }
                },
                "type": "object",
                "required": [
                    "category",
                    "description",
                    "idea"
                ],
                "title": "GoalsRequest"
            },
            "GoalsResponse": {
                "properties": {
                    "goals": {
                        "items": {
                            "$ref": "#/components/schemas/Goal"
                        },
                        "type": "array",
                        "title": "Goals"
                    }
                },
                "type": "object",
                "required": [
                    "goals"
                ],
                "title": "GoalsResponse"
            },
            "HTTPValidationError": {
                "properties": {
                    "detail": {
                        "items": {
                            "$ref": "#/components/schemas/ValidationError"
                        },
                        "type": "array",
                        "title": "Detail"
                    }
                },
                "type": "object",
                "title": "HTTPValidationError"
            },
            "MilestonePlan": {
                "properties": {
                    "title": {
                        "type": "string",
                        "title": "Title"
                    },
                    "after_step_index": {
                        "type": "integer",
                        "title": "After Step Index"
                    }
                },
                "type": "object",
                "required": [
                    "title",
                    "after_step_index"
                ],
                "title": "MilestonePlan"
            },
            "PlanRequest": {
                "properties": {
                    "category": {
                        "anyOf": [
                            {
                                "type": "string"
                            },
                            {
                                "type": "null"
                            }
                        ],
                        "title": "Category"
                    },
                    "description": {
                        "anyOf": [
                            {
                                "type": "string"
                            },
                            {
                                "type": "null"
                            }
                        ],
                        "title": "Description"
                    },
                    "idea": {
                        "type": "string",
                        "title": "Idea"
                    },
                    "goal": {
                        "type": "string",
                        "title": "Goal"
                    }
                },
                "type": "object",
                "required": [
                    "idea",
                    "goal"
                ],
                "title": "PlanRequest"
            },
            "PlanResponse": {
                "properties": {
                    "steps": {
                        "items": {
                            "$ref": "#/components/schemas/StepPlan"
                        },
                        "type": "array",
                        "title": "Steps"
                    },
                    "milestones": {
                        "items": {
                            "$ref": "#/components/schemas/MilestonePlan"
                        },
                        "type": "array",
                        "title": "Milestones"
                    }
                },
                "type": "object",
                "required": [
                    "steps",
                    "milestones"
                ],
                "title": "PlanResponse"
            },
            "ProjectContext": {
                "properties": {
                    "idea": {
                        "type": "string",
                        "title": "Idea"
                    },
                    "goal": {
                        "type": "string",
                        "title": "Goal"
                    },
                    "steps": {
                        "items": {
                            "type": "string"
                        },
                        "type": "array",
                        "title": "Steps"
                    },
                    "decisions": {
                        "items": {
                            "type": "string"
                        },
                        "type": "array",
                        "title": "Decisions"
                    }
                },
                "type": "object",
                "required": [
                    "idea",
                    "goal",
                    "steps",
                    "decisions"
                ],
                "title": "ProjectContext"
            },
            "QAPair": {
                "properties": {
                    "question": {
                        "type": "string",
                        "title": "Question"
                    },
                    "answer": {
                        "type": "string",
                        "title": "Answer"
                    }
                },
                "type": "object",
                "required": [
                    "question",
                    "answer"
                ],
                "title": "QAPair"
            },
            "StepPlan": {
                "properties": {
                    "title": {
                        "type": "string",
                        "title": "Title"
                    },
                    "description": {
                        "type": "string",
                        "title": "Description"
                    },
                    "order_index": {
                        "type": "integer",
                        "title": "Order Index"
                    },
                    "intended_start": {
                        "type": "string",
                        "title": "Intended Start"
                    },
                    "intended_end": {
                        "type": "string",
                        "title": "Intended End"
                    },
                    "depends_on": {
                        "items": {
                            "type": "integer"
                        },
                        "type": "array",
                        "title": "Depends On"
                    }
                },
                "type": "object",
                "required": [
                    "title",
                    "description",
                    "order_index",
                    "intended_start",
                    "intended_end",
                    "depends_on"
                ],
                "title": "StepPlan"
            },
            "SubTask": {
                "properties": {
                    "title": {
                        "type": "string",
                        "title": "Title"
                    },
                    "detail": {
                        "type": "string",
                        "title": "Detail"
                    }
                },
                "type": "object",
                "required": [
                    "title",
                    "detail"
                ],
                "title": "SubTask"
            },
            "SummaryRequest": {
                "properties": {
                    "messages": {
                        "items": {
                            "$ref": "#/components/schemas/ChatMessage"
                        },
                        "type": "array",
                        "title": "Messages"
                    },
                    "existing_summary": {
                        "anyOf": [
                            {
                                "type": "string"
                            },
                            {
                                "type": "null"
                            }
                        ],
                        "title": "Existing Summary"
                    }
                },
                "type": "object",
                "required": [
                    "messages"
                ],
                "title": "SummaryRequest"
            },
            "SummaryResponse": {
                "properties": {
                    "summary": {
                        "type": "string",
                        "title": "Summary"
                    }
                },
                "type": "object",
                "required": [
                    "summary"
                ],
                "title": "SummaryResponse"
            },
            "ValidationError": {
                "properties": {
                    "loc": {
                        "items": {
                            "anyOf": [
                                {
                                    "type": "string"
                                },
                                {
                                    "type": "integer"
                                }
                            ]
                        },
                        "type": "array",
                        "title": "Location"
                    },
                    "msg": {
                        "type": "string",
                        "title": "Message"
                    },
                    "type": {
                        "type": "string",
                        "title": "Error Type"
                    },
                    "input": {
                        "title": "Input"
                    },
                    "ctx": {
                        "type": "object",
                        "title": "Context"
                    }
                },
                "type": "object",
                "required": [
                    "loc",
                    "msg",
                    "type"
                ],
                "title": "ValidationError"
            }
        }
    }
}
